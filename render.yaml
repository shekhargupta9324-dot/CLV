services:
  - type: web
    name: clv-predictor-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: MONGO_URI
        sync: false
      - key: MONGO_DB_NAME
        value: CLV
